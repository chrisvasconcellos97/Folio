<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D1F1C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Folio" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Folio — Account Management</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', sans-serif; background: #0D1F1C; color: #E8F0EC; }

      /* Pip animations */
      .pip-pulse { animation: pipPulse 2s ease-in-out infinite; }
      @keyframes pipPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.7; transform: scale(0.92); }
      }

      .pip-sonar { position: relative; }
      .pip-sonar::before,
      .pip-sonar::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 52px; height: 52px;
        border-radius: 50%;
        border: 1px solid rgba(74,155,130,0.35);
        transform: translate(-50%, -50%) scale(1);
        animation: sonarRing 3s ease-out infinite;
        pointer-events: none;
        z-index: -1;
      }
      .pip-sonar::after { animation-delay: 1.5s; }
      @keyframes sonarRing {
        0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.6; }
        100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(74,155,130,0.2); border-radius: 2px; }

      /* Input resets */
      input, textarea { -webkit-appearance: none; }
      input:focus, textarea:focus { outline: none; }

      /* Overlay / modal transition */
      .fade-in { animation: fadeIn 0.15s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

      /* View content transition */
      .view-fade-in { animation: viewFadeIn 0.32s ease-out; }
      @keyframes viewFadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

      /* Tab content transition */
      .tab-fade-in { animation: tabFadeIn 0.15s ease-out; }
      @keyframes tabFadeIn { from { opacity: 0; } to { opacity: 1; } }

      /* Pip view-transition collapse / emerge */
      .pip-out { animation: pipCollapse 0.18s ease-in forwards; }
      .pip-in  { animation: pipEmerge  0.32s cubic-bezier(0.34,1.56,0.64,1) forwards; }
      @keyframes pipCollapse {
        from { opacity: 1; transform: scale(1); }
        to   { opacity: 0; transform: scale(0.15); }
      }
      @keyframes pipEmerge {
        from { opacity: 0; transform: scale(0.15); }
        to   { opacity: 1; transform: scale(1); }
      }

      /* Welcome / Pip tour animations */
      @keyframes pipFloat {
        0%, 100% { transform: translateY(0px) scale(1); }
        50%       { transform: translateY(-14px) scale(1.02); }
      }
      @keyframes pipRise {
        0%   { opacity: 0; transform: translateY(50px) scale(0.3); }
        100% { opacity: 1; transform: translateY(0px)  scale(1);   }
      }
      @keyframes folioAppear {
        0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.7); }
        100% { opacity: 1; transform: translate(-50%,-50%) scale(1);   }
      }
      @keyframes tourSonar {
        0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.5; }
        100% { transform: translate(-50%,-50%) scale(3.5); opacity: 0;   }
      }
      @keyframes tapPulse {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 1;   }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
