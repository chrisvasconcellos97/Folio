<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Folio — Account Management</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', sans-serif; background: #12100A; color: #F0EDE8; }

      /* Pip animations */
      .pip-pulse { animation: pipPulse 2s ease-in-out infinite; }
      @keyframes pipPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.7; transform: scale(0.92); }
      }

      .pip-sonar { position: relative; }
      .pip-sonar::before,
      .pip-sonar::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 52px; height: 52px;
        border-radius: 50%;
        border: 1px solid rgba(200, 136, 58, 0.35);
        transform: translate(-50%, -50%) scale(1);
        animation: sonarRing 3s ease-out infinite;
        pointer-events: none;
        z-index: -1;
      }
      .pip-sonar::after { animation-delay: 1.5s; }
      @keyframes sonarRing {
        0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.6; }
        100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(200,136,58,0.2); border-radius: 2px; }

      /* Input resets */
      input, textarea { -webkit-appearance: none; }
      input:focus, textarea:focus { outline: none; }

      /* Overlay transition */
      .fade-in { animation: fadeIn 0.15s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
