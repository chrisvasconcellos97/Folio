<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D1F1C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Folio" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Folio — Account Management</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', sans-serif; background: #0D1F1C; color: #E8F0EC; }

      /* Pip animations */
      .pip-pulse { animation: pipPulse 2s ease-in-out infinite; }
      @keyframes pipPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.7; transform: scale(0.92); }
      }

      .pip-sonar { position: relative; }
      .pip-sonar::before,
      .pip-sonar::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 52px; height: 52px;
        border-radius: 50%;
        border: 1px solid rgba(74,155,130,0.35);
        transform: translate(-50%, -50%) scale(1);
        animation: sonarRing 3s ease-out infinite;
        pointer-events: none;
        z-index: -1;
      }
      .pip-sonar::after { animation-delay: 1.5s; }
      @keyframes sonarRing {
        0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.6; }
        100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(74,155,130,0.2); border-radius: 2px; }

      /* Input resets */
      input, textarea { -webkit-appearance: none; }
      input:focus, textarea:focus { outline: none; }

      /* Native feel */
      * { -webkit-tap-highlight-color: transparent; }
      html, body { overscroll-behavior: none; }

      /* No text selection on UI chrome — applied per-component for content areas */
      .no-select { user-select: none; -webkit-user-select: none; }

      /* Staggered list entrance */
      .list-item { animation: listFadeIn 0.25s ease-out both; }
      @keyframes listFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Active press states */
      .pressable:active { opacity: 0.72; transform: scale(0.97); transition: opacity 0.08s, transform 0.08s; }

      /* Mobile sheet modal */
      @media (max-width: 640px) {
        .modal-sheet {
          position: fixed !important;
          bottom: 0 !important;
          left: 0 !important;
          right: 0 !important;
          top: auto !important;
          transform: none !important;
          border-radius: 20px 20px 0 0 !important;
          max-height: 92vh;
          overflow-y: auto;
          animation: sheetUp 0.28s cubic-bezier(0.32, 0.72, 0, 1) !important;
        }
        @keyframes sheetUp {
          from { transform: translateY(100%); }
          to   { transform: translateY(0); }
        }
      }

      /* Overlay / modal transition */
      .fade-in { animation: fadeIn 0.15s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

      /* View content transition */
      .view-fade-in   { animation: viewFadeIn   0.45s ease-out; }
      .view-slide-right { animation: slideInRight 0.45s ease-out; }
      .view-slide-left  { animation: slideInLeft  0.45s ease-out; }
      @keyframes viewFadeIn   { from { opacity: 0; transform: translateY(16px); }   to { opacity: 1; transform: translateY(0); } }
      @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); }   to { opacity: 1; transform: translateX(0); } }
      @keyframes slideInLeft  { from { opacity: 0; transform: translateX(-40px); }  to { opacity: 1; transform: translateX(0); } }

      /* Tab content transition */
      .tab-slide-right { animation: slideInRight 0.22s ease-out; }
      .tab-slide-left  { animation: slideInLeft  0.22s ease-out; }

      /* Pip view-transition collapse / emerge */
      .pip-out { animation: pipCollapse 0.18s ease-in forwards; }
      .pip-in  { animation: pipEmerge  0.32s cubic-bezier(0.34,1.56,0.64,1) forwards; }
      @keyframes pipCollapse {
        from { opacity: 1; transform: scale(1); }
        to   { opacity: 0; transform: scale(0.15); }
      }
      @keyframes pipEmerge {
        from { opacity: 0; transform: scale(0.15); }
        to   { opacity: 1; transform: scale(1); }
      }

      /* Welcome / Pip tour animations */
      @keyframes pipFloat {
        0%, 100% { transform: translateY(0px) scale(1); }
        50%       { transform: translateY(-14px) scale(1.02); }
      }
      @keyframes pipRise {
        0%   { opacity: 0; transform: translateY(50px) scale(0.3); }
        100% { opacity: 1; transform: translateY(0px)  scale(1);   }
      }
      @keyframes folioAppear {
        0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.7); }
        100% { opacity: 1; transform: translate(-50%,-50%) scale(1);   }
      }
      @keyframes tourSonar {
        0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.5; }
        100% { transform: translate(-50%,-50%) scale(3.5); opacity: 0;   }
      }
      @keyframes tapPulse {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 1;   }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
