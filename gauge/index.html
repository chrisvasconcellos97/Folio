<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gauge — Project Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #12100A;
        color: #F0EDE8;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      input, select, textarea, button { font-family: inherit; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1A2030; border-radius: 3px; }
      input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.4) sepia(1) saturate(2) hue-rotate(180deg); cursor: pointer; }

      .pip-sonar { position: relative; }
      .pip-sonar::before, .pip-sonar::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 56px; height: 56px;
        border-radius: 50%;
        border: 1px solid rgba(103,200,249,0.35);
        animation: sonarRing 2.5s ease-out infinite;
        pointer-events: none;
      }
      .pip-sonar::after { animation-delay: 1.25s; }
      @keyframes sonarRing {
        0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.6; }
        100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0;   }
      }

      .pip-pulse { animation: pipPulse 2s ease-in-out infinite; }
      @keyframes pipPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.7; transform: scale(0.92); }
      }

      .fade-in { animation: fadeIn 0.15s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

      @keyframes pipFloat {
        0%, 100% { transform: translateY(0px) scale(1); }
        50%       { transform: translateY(-14px) scale(1.02); }
      }
      @keyframes pipRise {
        0%   { opacity: 0; transform: translateY(50px) scale(0.3); }
        100% { opacity: 1; transform: translateY(0px)  scale(1);   }
      }
      @keyframes gaugeAppear {
        0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.7); }
        100% { opacity: 1; transform: translate(-50%,-50%) scale(1);   }
      }
      @keyframes tourSonar {
        0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.5; }
        100% { transform: translate(-50%,-50%) scale(3.5); opacity: 0;   }
      }
      @keyframes tapPulse {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 1;   }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
