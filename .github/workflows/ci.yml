name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Advisory only — repo carries ~66 pre-existing lint errors; surface them
      # without gating the build until that backlog is cleared. Make it a hard
      # gate again once `npm run lint` is clean.
      - run: npm run lint || true
      - run: npm audit --omit=dev || true
      - run: node scripts/test-api-imports.js
      - run: node scripts/check-guards.js
      - run: npm run test
      - run: npm run build
